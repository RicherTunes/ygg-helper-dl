<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YggHelper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="app-header">
    <div class="logo-area">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">
        <h1>YggHelper</h1>
        <span class="badge" id="appVersion"></span>
      </div>
    </div>
    <div class="credits-btn" id="creditsLink" title="Développé par RicherTunes (fork de MoowGlax)">
      ❤️
    </div>
  </header>

  <div class="stats-banner">
    <span class="stats-icon">⏳</span>
    <span class="stats-label">Temps gagné:</span>
    <span class="stats-value" id="wastedTimeDisplay">0s</span>
  </div>

  <div id="updateBanner" class="update-banner" style="display: none;">
    <span class="update-icon">🎉</span>
    <div class="update-text">
        <span class="update-title">Mise à jour disponible !</span>
        <span class="update-version">v<span id="newVersion"></span></span>
    </div>
    <a href="#" id="updateLink" class="update-btn">Voir</a>
  </div>

  <main class="app-content">
    <!-- File d'attente & Actifs -->
    <div class="section-title">
      <span>Pipeline</span>
      <span class="count-badge" id="pipelineCount">0</span>
    </div>
    <div id="pipelineList" class="timers-list">
      <!-- Cartes injectées par popup.js -->
    </div>

    <!-- Terminés -->
    <div class="section-title" id="completedSectionTitle" style="display:none; margin-top: 15px;">
      <span>Terminés</span>
      <span class="count-badge" id="completedCount">0</span>
    </div>
    <div id="completedList" class="timers-list"></div>
  </main>

  <div class="settings-section">
    <div class="settings-toggle" id="settingsToggle">
      <span>Domaine personnalisé</span>
      <span class="settings-arrow" id="settingsArrow">&#9654;</span>
    </div>
    <div class="settings-body" id="settingsBody" style="display: none;">
      <p class="settings-hint">Si YggTorrent a changé de domaine et l'extension ne fonctionne pas, entrez le nouveau domaine ici (ex: yggtorrent.wtf)</p>
      <div class="domain-input-row">
        <input type="text" id="domainInput" class="domain-input" placeholder="yggtorrent.example">
        <button id="saveDomainBtn" class="domain-save-btn">OK</button>
      </div>
      <div id="domainStatus" class="domain-status"></div>
      <button id="removeDomainBtn" class="domain-remove-btn" style="display: none;">Supprimer le domaine personnalisé</button>
    </div>
  </div>

  <footer class="app-footer">
    <button id="cleanAllBtn" class="secondary-btn">Tout nettoyer</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
