<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YggHelper - Update Available</title>
  <link rel="stylesheet" href="../popup.css">
</head>
<body>
  <header class="app-header">
    <div class="logo-area">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">
        <h1>YggHelper</h1>
        <span class="badge">v1.3.2</span>
      </div>
    </div>
    <div class="credits-btn" title="Développé par RicherTunes (fork de MoowGlax)">❤️</div>
  </header>

  <div class="stats-banner">
    <span class="stats-icon">⏳</span>
    <span class="stats-label">Temps gagné:</span>
    <span class="stats-value">30s</span>
  </div>

  <!-- Update Banner -->
  <div class="update-banner">
    <span class="update-icon">🎉</span>
    <div class="update-text">
      <span class="update-title">Mise à jour disponible !</span>
      <span class="update-version">v1.4.0</span>
    </div>
    <a href="#" class="update-btn">Voir</a>
  </div>

  <main class="app-content">
    <div class="section-title">
      <span>Pipeline</span>
      <span class="count-badge">1</span>
    </div>
    <div class="timers-list">
      <div class="timer-card status-queued">
        <div class="timer-header">
          <span class="timer-name">Big.Buck.Bunny.2024.FRENCH.1080p...</span>
          <span class="phase-badge queued">En file</span>
        </div>
        <div class="timer-footer">
          <span class="timer-status">En attente de traitement</span>
          <div class="action-group">
            <button class="action-btn remove">×</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="settings-section">
    <div class="settings-toggle">
      <span>Domaine personnalisé</span>
      <span class="settings-arrow">▶</span>
    </div>
  </div>

  <footer class="app-footer">
    <button class="secondary-btn">Tout nettoyer</button>
  </footer>
</body>
</html>
